name: Rust CI

on:
  push:
    branches: [ "main", "001-move-generation-core" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Lint with clippy
      run: cargo clippy -- -D warnings
    - name: Check format
      run: cargo fmt -- --check
