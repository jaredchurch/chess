<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess WASM</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #2c3e50;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #app {
            display: flex;
            flex: 1;
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        #board-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1;
            border: 2px solid #34495e;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .square {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: min(8vmin, 40px);
            cursor: pointer;
            user-select: none;
        }
        .white-square { background-color: #f0d9b5; }
        .black-square { background-color: #b58863; }
        .highlight { background-color: #f1c40f !important; }
        .piece-white { color: #ffffff; text-shadow: 0 0 2px rgba(0,0,0,0.8); }
        .piece-black { color: #000000; }
        #status { font-size: 1.2em; text-align: center; }
        #fen { font-size: 0.8em; color: #bdc3c7; word-break: break-all; text-align: center; }
        .controls { display: flex; gap: 10px; }
        button {
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover { background: #2980b9; }
        
        /* Info Cards */
        #info-panel {
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .card {
            background: #34495e;
            border-radius: 8px;
            padding: 15px;
        }
        .card-title {
            font-size: 1em;
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 1px solid #4a5f7f;
            padding-bottom: 8px;
        }
        
        /* Score Card */
        #score-card {
            display: flex;
            justify-content: space-around;
        }
        .score-section {
            text-align: center;
        }
        .score-title {
            font-size: 0.9em;
            color: #bdc3c7;
        }
        .score-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #2ecc71;
        }
        .captured-pieces {
            font-size: 1.2em;
            min-height: 24px;
            margin-top: 5px;
        }
        .captured-pieces .piece-white {
            color: #ffffff;
            text-shadow: 0 0 2px rgba(0,0,0,0.8);
            margin-right: 2px;
        }
        .captured-pieces .piece-black {
            color: #000000;
            margin-right: 2px;
        }
        
        /* Move History */
        #move-history {
            max-height: 250px;
            overflow-y: auto;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-title {
            cursor: pointer;
        }
        .card-toggle {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.2em;
            cursor: pointer;
            line-height: 1;
        }
        .move-row {
            display: flex;
            gap: 8px;
            padding: 4px 0;
            border-bottom: 1px solid #4a5f7f;
        }
        .move-number {
            color: #bdc3c7;
            width: 30px;
        }
        .move-item {
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .move-item:hover {
            background: #3498db;
        }
        .no-moves {
            color: #bdc3c7;
            text-align: center;
        }
        
        /* Preview Dialog */
        .preview-dialog {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .preview-content {
            background: #34495e;
            border-radius: 10px;
            padding: 20px;
            max-width: 90vw;
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .preview-close {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
        }
        .preview-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: min(60vw, 350px);
            aspect-ratio: 1;
        }
        
        /* Menu button */
        #menu-btn {
            display: none;
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 100;
            padding: 10px 15px;
        }
        
        /* Responsive */
        @media (max-width: 700px) {
            #app {
                flex-direction: column;
                align-items: center;
            }
            #info-panel {
                width: 100%;
                max-width: 500px;
                display: none;
            }
            #info-panel.open {
                display: flex;
            }
            #menu-btn {
                display: block;
            }
            .preview-board {
                width: min(80vw, 300px);
            }
        }
    </style>
</head>
<body>
    <button id="menu-btn" onclick="toggleMenu()">Menu</button>
    <div id="app">
        <div id="board-container">
            <div id="status">Initializing...</div>
            <div id="board"></div>
            <div id="fen"></div>
            <div class="controls">
                <button onclick="resetGame()">Reset</button>
                <button onclick="flipBoard()">Flip</button>
            </div>
        </div>
        <div id="info-panel">
            <div class="card">
                <div class="card-title">Score</div>
                <div id="score-card">
                    <div class="score-section">
                        <div class="score-title">White</div>
                        <div class="score-value">+0</div>
                        <div class="captured-pieces"></div>
                    </div>
                    <div class="score-section">
                        <div class="score-title">Black</div>
                        <div class="score-value">+0</div>
                        <div class="captured-pieces"></div>
                    </div>
                </div>
            </div>
<div class="card">
                <div class="card-header">
                    <div class="card-title">Move History</div>
                    <button class="card-toggle" onclick="toggleMoveHistory()">−</button>
                </div>
                <div id="move-history">
                    <div class="no-moves">No moves yet</div>
                </div>
            </div>
                <div id="move-history">
                    <div class="no-moves">No moves yet</div>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module" src="./index.js"></script>
    <script>
        window.toggleMenu = function() {
            document.getElementById('info-panel').classList.toggle('open');
        };
        window.toggleMoveHistory = function() {
            moveHistoryCollapsed = !moveHistoryCollapsed;
            const btn = document.querySelector('.card-toggle');
            btn.textContent = moveHistoryCollapsed ? '+' : '−';
            if (!moveHistoryCollapsed) {
                updateMoveHistoryCard();
            }
        };
    </script>
</body>
</html>
