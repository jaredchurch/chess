<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess WASM</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #2c3e50;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #app {
            display: flex;
            flex: 1;
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            align-items: flex-start;
        }
        #board-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1;
            border: 2px solid #34495e;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .square {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: min(8vmin, 40px);
            cursor: pointer;
            user-select: none;
        }
        .white-square { background-color: #f0d9b5; }
        .black-square { background-color: #b58863; }
        .highlight { background-color: #f1c40f !important; }
        .piece-white { color: #ffffff; text-shadow: 0 0 2px rgba(0,0,0,0.8); }
        .piece-black { color: #000000; }
        #status { font-size: 1.2em; text-align: center; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        button {
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover { background: #2980b9; }
        
        #info-panel {
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 50px;
        }
.card {
            background: #34495e;
            border-radius: 8px;
            padding: 15px;
        }
        .card-title {
            font-size: 1em;
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 1px solid #4a5f7f;
            padding-bottom: 8px;
        }
        .card button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            font-size: 1em;
            cursor: pointer;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
        }
        .card button:hover { background: #2980b9; }
        
        /* Score Card */
        #score-card {
            display: flex;
            justify-content: space-around;
        }
        .score-section {
            text-align: center;
        }
        .score-title {
            font-size: 0.9em;
            color: #bdc3c7;
        }
        .score-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #2ecc71;
        }
        .captured-pieces {
            font-size: 1.2em;
            min-height: 24px;
            margin-top: 5px;
        }
        .captured-pieces .piece-white { color: #ffffff; text-shadow: 0 0 2px rgba(0,0,0,0.8); margin-right: 2px; }
        .captured-pieces .piece-black { color: #000000; margin-right: 2px; }
        
        /* Move History */
        #move-history {
            max-height: 250px;
            overflow-y: auto;
        }
        .move-row {
            display: flex;
            gap: 8px;
            padding: 4px 0;
            border-bottom: 1px solid #4a5f7f;
        }
        .move-number { color: #bdc3c7; width: 30px; }
        .move-item { cursor: pointer; padding: 2px 6px; border-radius: 3px; }
        .move-item:hover { background: #3498db; }
        
        /* Preview Dialog */
        #preview-dialog {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        #preview-dialog.hidden { display: none; }
        .preview-content {
            background: #34495e;
            border-radius: 10px;
            padding: 20px;
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .preview-close {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
        }
        #preview-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: min(60vw, 350px);
            aspect-ratio: 1;
        }
        #preview-board .square {
            font-size: min(6vmin, 30px);
        }
        @media (min-width: 500px) {
            #preview-board .square { font-size: 30px; }
        }
        
        @media (max-width: 700px) {
            #app { flex-direction: column; align-items: center; }
            #info-panel { width: 100%; max-width: 500px; display: none; margin-top: 50px; }
            #info-panel.open { display: flex; }
        }
    </style>
    <button id="menu-btn" onclick="showGameMenu()" style="position:fixed;top:10px;right:10px;z-index:100;padding:10px 15px;">Menu</button>
</head>
<body>
    <div id="app">
        <div id="board-container">
            <div id="status">Initializing...</div>
            <div id="board"></div>
            <div id="fen" style="display:none"></div>
            <div class="controls">
                <button onclick="resetGame()">Reset</button>
                <button onclick="flipBoard()">Flip</button>
                <select id="player-color" onchange="changePlayerColor()">
                    <option value="random">Random</option>
                    <option value="white">White</option>
                    <option value="black">Black</option>
                </select>
            </div>
        </div>
        <div id="info-panel">
            <div class="card" id="score-card-wrapper">
                <div class="card-title">Score</div>
                <div id="score-card">
                    <div class="score-section">
                        <div class="score-title">White</div>
                        <div class="score-value">+0</div>
                        <div class="captured-pieces"></div>
                    </div>
                    <div class="score-section">
                        <div class="score-title">Black</div>
                        <div class="score-value">+0</div>
                        <div class="captured-pieces"></div>
                    </div>
                </div>
            </div>
            <div class="card" id="history-card-wrapper">
                <div class="card-title">Move History</div>
                <div id="move-history"></div>
            </div>
        </div>
    </div>
    
    <script type="module" src="./js/index.js"></script>
    <script>
        var moveHistoryCollapsed = false;
        window.showGameMenu = function() {
            const scoreWrapper = document.getElementById('score-card-wrapper');
            const historyWrapper = document.getElementById('history-card-wrapper');
            const scoreShown = scoreWrapper.style.display !== 'none';
            const historyShown = historyWrapper.style.display !== 'none';
            const scoreChecked = scoreShown ? 'checked' : '';
            const historyChecked = historyShown ? 'checked' : '';
            const dialog = document.createElement('div');
            dialog.id = 'game-menu-dialog';
            dialog.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:1000;display:flex;align-items:center;justify-content:center;';
            dialog.innerHTML = `
                <div style="background:#34495e;border-radius:10px;padding:20px;min-width:250px;">
                    <div style="margin-bottom:15px;font-size:1.2em;font-weight:bold;">Game Menu</div>
                    <label style="display:block;margin:10px 0;cursor:pointer;">
                        <input type="checkbox" id="show-score" ${scoreChecked} onchange="togglePanelDisplay('score-card-wrapper', this.checked)"> Show Score
                    </label>
                    <label style="display:block;margin:10px 0;cursor:pointer;">
                        <input type="checkbox" id="show-history" ${historyChecked} onchange="togglePanelDisplay('history-card-wrapper', this.checked)"> Show Move History
                    </label>
                    <hr style="border-color:#4a5f7f;margin:15px 0;">
                    <button onclick="exportHistory();closeGameMenu();">Export History</button>
                    <button onclick="document.getElementById('import-file').click();closeGameMenu();">Import History</button>
                    <input type="file" id="import-file" style="display:none" onchange="importHistory(this)">
                    <hr style="border-color:#4a5f7f;margin:15px 0;">
                    <button onclick="closeGameMenu()">Close</button>
                </div>
            `;
            document.body.appendChild(dialog);
            dialog.onclick = (e) => { if (e.target === dialog) closeGameMenu(); };
        };
        window.closeGameMenu = function() {
            const dialog = document.getElementById('game-menu-dialog');
            if (dialog) dialog.remove();
        };
        window.togglePanelDisplay = function(id, visible) {
            const el = document.getElementById(id);
            if (el) el.style.display = visible ? 'block' : 'none';
        };
    </script>
</body>
</html>
