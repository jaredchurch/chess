<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess WASM</title>
    <link rel="stylesheet" href="./css/styles.css">
    <button id="menu-btn" onclick="showGameMenu()" style="position:fixed;top:10px;right:10px;z-index:100;background:transparent;border:none;color:white;font-size:20px;padding:8px;">&#9776;</button>
    <button id="settings-btn" onclick="showSettingsMenu()" style="position:fixed;top:10px;right:45px;z-index:100;background:transparent;border:none;color:white;font-size:18px;padding:8px;">&#9881;</button>
</head>
<body>
    <div id="app">
        <div id="board-container">
            <div id="status">Initializing...</div>
            <div id="board"></div>
            <div id="fen" style="display:none"></div>
            <div class="controls">
                <button onclick="resetGame()">Reset</button>
                <select id="player-color" onchange="changePlayerColor()">
                    <option value="random">Random</option>
                    <option value="white">White</option>
                    <option value="black">Black</option>
                </select>
            </div>
        </div>
        <div id="info-panel">
            <div class="card" id="score-card-wrapper">
                <div class="card-title">Score</div>
                <div id="score-card">
                    <div class="score-section">
                        <div class="score-title">White</div>
                        <div class="score-value">+0</div>
                        <div class="captured-pieces"></div>
                    </div>
                    <div class="score-section">
                        <div class="score-title">Black</div>
                        <div class="score-value">+0</div>
                        <div class="captured-pieces"></div>
                    </div>
                </div>
            </div>
            <div class="card" id="history-card-wrapper">
                <div class="card-title">Move History</div>
                <div id="move-history"></div>
            </div>
        </div>
    </div>
    
    <script type="module" src="./js/index.js"></script>
    <script src="./js/dialogs.js"></script>
</body>
</html>
