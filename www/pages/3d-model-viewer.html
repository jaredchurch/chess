<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Chess Model Viewer</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
        }
    }
    </script>
</head>
<body>
    <div id="header">
        <div class="header-left">
            <button id="back-btn" onclick="window.location.href='../index.html'">&#8592;</button>
            <span>3D Model Viewer</span>
        </div>
        <div id="status-text">Loading 3D models...</div>
    </div>

    <div id="viewer-layout">
        <div id="model-container">
            <div id="board-wrapper">
                <div id="board"></div>
            </div>
        </div>
        <div id="viewer-controls">
             <div class="control-section">
                 <h3>View</h3>
                 <div class="btn-group">
                     <button class="view-mode-btn active" data-mode="full">Full</button>
                     <button class="view-mode-btn" data-mode="board">Board</button>
                     <button class="view-mode-btn" data-mode="piece">Piece</button>
                 </div>
             </div>
             <div class="control-section">
                 <h3>Skin</h3>
                 <label>
                     <select id="skin-select">
                         <!-- Options will be populated by JavaScript -->
                     </select>
                 </label>
             </div>
             <div class="control-section" id="piece-controls" style="display:none">
                 <h3>Piece</h3>
                 <label>Type:
                     <select id="piece-type">
                         <option value="K">King</option>
                         <option value="Q">Queen</option>
                         <option value="R">Rook</option>
                         <option value="B">Bishop</option>
                         <option value="N">Knight</option>
                         <option value="P">Pawn</option>
                     </select>
                 </label>
                 <label>Color:
                     <select id="piece-color">
                         <option value="white">White</option>
                         <option value="black">Black</option>
                     </select>
                 </label>
             </div>
            <div class="control-section">
                <h3>Camera</h3>
                <label>X: <input type="range" id="cam-x" min="-20" max="20" step="0.1" value="0"> <span id="cam-x-val" class="cam-val">0.0</span></label>
                <label>Y: <input type="range" id="cam-y" min="1" max="30" step="0.1" value="11.8"> <span id="cam-y-val" class="cam-val">11.8</span></label>
                <label>Z: <input type="range" id="cam-z" min="-20" max="20" step="0.1" value="16.5"> <span id="cam-z-val" class="cam-val">16.5</span></label>
                <label>FOV: <input type="range" id="cam-fov" min="5" max="80" step="1" value="28"> <span id="cam-fov-val" class="cam-val">28</span></label>
                <button id="reset-camera">Reset Camera</button>
            </div>
            <div class="control-section">
                <h3>Lighting</h3>
                <label>Light X: <input type="range" id="light-x" min="-20" max="20" step="0.5" value="5"> <span id="light-x-val" class="cam-val">5.0</span></label>
                <label>Light Y: <input type="range" id="light-y" min="1" max="30" step="0.5" value="15"> <span id="light-y-val" class="cam-val">15.0</span></label>
                <label>Light Z: <input type="range" id="light-z" min="-20" max="20" step="0.5" value="10"> <span id="light-z-val" class="cam-val">10.0</span></label>
                <label>Intensity: <input type="range" id="light-intensity" min="0" max="5" step="0.05" value="2.95"> <span id="light-intensity-val" class="cam-val">2.95</span></label>
                <label>Ambient: <input type="range" id="ambient-intensity" min="0" max="2" step="0.05" value="0.3"> <span id="ambient-intensity-val" class="cam-val">0.30</span></label>
                <button id="reset-lighting">Reset Lighting</button>
            </div>
        </div>
    </div>

    <script type="module" src="../js/index.js"></script>
    <script type="module" src="../js/model-viewer.js"></script>
</body>
</html>
